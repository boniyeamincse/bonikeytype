name: Feature Request
description: Suggest an idea for this project.
labels: [enhancement]
body:
  - type: textarea
    id: feature
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why is this needed?
      placeholder: Explain the use case for this feature.
